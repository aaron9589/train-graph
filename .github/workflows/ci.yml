name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # package-lock.json is generated on macOS and omits Linux-specific
        # optional deps (e.g. @rollup/rollup-linux-x64-gnu).  Removing it
        # lets npm resolve platform packages correctly on the CI runner.
        run: rm -f package-lock.json && npm install

      - name: Typecheck & build client
        run: npm run build --workspace=client
